version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: accessboss
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: accessboss
    repository:
      owner: webbhalsa
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/webbhalsa/accessboss-cli"
    description: "Ephemeral AWS access management from the command line"
    install: |
      bin.install "accessboss"
    caveats: |
      Run 'accessboss --help' to get started.
